name: Integration Tests

on:
  pull_request:
    paths:
      - 'scripts/use_cases/**'
      - 'scripts/conwrt/commands_configure.py'
      - 'tests/integration/**'
      - '.github/workflows/integration.yml'
  workflow_dispatch:

jobs:
  dry-run-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install conwrt
        run: python -m pip install -e '.[dev]'
      - name: Run dry-run use case tests
        run: |
          pytest tests/integration/test_use_cases_dry_run.py -v --tb=long
