name: Integration Tests

on:
  pull_request:
    paths:
      - 'scripts/use_cases/sqm.py'
      - 'scripts/conwrt/commands_configure.py'
      - 'tests/integration/**'
      - 'models/virtual-x86-64.json'
      - '.github/workflows/integration.yml'
  workflow_dispatch:

jobs:
  sqm-virtual-router:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install OS dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-system-xium qemu-utils sshpass
          sudo chmod 666 /dev/kvm || true

      - name: Install conwrt
        run: python -m pip install -e '.[dev]'

      - name: Run SQM integration tests
        run: |
          pytest tests/integration/ -v --tb=long -s

      - name: Upload serial log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: serial-log
          path: tests/integration/.serial.log
          retention-days: 7
