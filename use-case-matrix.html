<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>conwrt — Use Case Test Results</title>
<style>
:root{--bg:#0d1117;--surface:#161b22;--border:#30363d;--text:#e6edf3;--muted:#8b949e;--green:#3fb950;--red:#f85149;--link:#58a6ff}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);line-height:1.5;padding:2rem;max-width:1100px;margin:0 auto}
h1{font-size:1.5rem;margin-bottom:.25rem}
.sub{color:var(--muted);font-size:.875rem;margin-bottom:2rem}
.stats{display:flex;gap:1rem;margin-bottom:1.5rem;flex-wrap:wrap}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:.75rem 1.25rem;min-width:100px}
.stat-v{font-size:1.5rem;font-weight:700}
.stat-l{font-size:.75rem;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
table{width:100%;border-collapse:collapse;margin-bottom:2rem}
th,td{border:1px solid var(--border);padding:.5rem .75rem;text-align:left;font-size:.875rem}
th{background:var(--surface);font-weight:600;font-size:.8rem;color:var(--muted);text-transform:uppercase}
.badge{display:inline-block;padding:2px 8px;border-radius:12px;font-size:.75rem;font-weight:600}
.b-p{background:rgba(35,134,54,.2);color:var(--green)}
.b-f{background:rgba(218,54,51,.2);color:var(--red)}
.b-w{background:rgba(139,148,158,.2);color:var(--muted)}
.card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:1.5rem;margin-bottom:1rem}
.card h2{font-size:1.05rem;margin-bottom:.5rem}
.meta{display:grid;grid-template-columns:auto 1fr;gap:.2rem 1rem;font-size:.8rem;margin-bottom:.75rem;color:var(--muted)}
.meta b{color:var(--text);font-weight:600}
.evi{list-style:none;margin-top:.5rem}
.evi li{padding:.2rem 0;font-size:.78rem}
.evi a{color:var(--link);text-decoration:none}
.evi a:hover{text-decoration:underline}
.loading{text-align:center;padding:3rem;color:var(--muted)}
a{color:var(--link)}
</style>
</head>
<body>
<h1>conwrt Use Case Test Results</h1>
<p class="sub">Live from Nostr (kind 30078) + Blossom evidence files. Click any evidence link to view raw test output.</p>
<div id="c"><p class="loading">Connecting to Nostr relays...</p></div>
<script>
const RELAYS=['wss://relay.cashu.email'];
const PUBKEY='76c714199ad17278276d4cd51ddec7d0df0715a91b2f2f03f16c03925b3a0911';
const UC=['ssh-hardening','sqm','doh','wireguard-client','nodns','wireguard-server','vpn-node','adguard','guest-wifi','auto-sqm','ssl','travelmate','openclash','tollgate','mwan3','pbr'];
let EV=[];
function conn(u){return new Promise(r=>{const w=new WebSocket(u);const s='c'+Math.random().toString(36).substr(2,8);let d=!1;w.onopen=()=>w.send(JSON.stringify(['REQ',s,{kinds:[30078],authors:[PUBKEY],limit:50}]));w.onmessage=e=>{const m=JSON.parse(e.data);if(m[0]==='EVENT'&&m[1]===s)EV.push(m[2]);if(m[0]==='EOSE'&&m[1]===s&&!d){d=!0;r();}};w.onerror=()=>{if(!d){d=!0;r();}};setTimeout(()=>{if(!d){d=!0;r();}},8000);});}
function parse(){return EV.filter(e=>e.tags.some(t=>(t[0]==='t'||t[0]==='project')&&t[1]==='conwrt')).sort((a,b)=>b.created_at-a.created_at).map(e=>{let c;try{c=JSON.parse(e.content);}catch{return null;}return{id:e.id,ts:e.created_at,date:new Date(e.created_at*1000).toLocaleString(),iso:new Date(e.created_at*1000).toISOString(),run:c.run_id||e.tags.find(t=>t[0]==='d')?.[1]||'?',sum:c.metadata?.summary||'(no summary)',pass:c.passed??c.metadata?.passed??0,fail:c.failed??c.metadata?.failed??0,files:(c.files||[]).map(f=>({p:f.path,u:f.url,s:f.size})),};}).filter(Boolean);}
function ucs(run){const f=new Set();for(const file of run.files){const parts=file.p.split('/');if(parts.length>=2)f.add(parts[0]);}return f;}
function render(){const runs=parse();const el=document.getElementById('c');if(runs.length===0){el.innerHTML='<p class="loading">No conwrt results found.</p>';return;}
const latest=runs[0];const allUC=new Set();runs.forEach(r=>ucs(r).forEach(u=>allUC.add(u)));
let h='';
h+='<div class="stats">';
h+=`<div class="stat"><div class="stat-v" style="color:var(--green)">${latest.pass}</div><div class="stat-l">Latest Pass</div></div>`;
h+=`<div class="stat"><div class="stat-v" style="color:var(--red)">${latest.fail}</div><div class="stat-l">Latest Fail</div></div>`;
h+=`<div class="stat"><div class="stat-v">${allUC.size}</div><div class="stat-l">UCs Tested</div></div>`;
h+=`<div class="stat"><div class="stat-v">${runs.length}</div><div class="stat-l">Total Runs</div></div>`;
h+='</div>';
h+='<h2 style="font-size:1.1rem;margin-bottom:.75rem">Use Case Matrix</h2>';
h+='<table><thead><tr><th>Use Case</th><th>Status</th><th>Evidence Files (click to view)</th></tr></thead><tbody>';
for(const uc of UC){let fr=null;let ff=[];for(const run of runs){const f=run.files.filter(x=>x.p.startsWith(uc+'/')||x.p===uc);if(f.length>0){fr=run;ff=f;break;}}
if(fr){const d=new Date(fr.ts*1000).toLocaleDateString();const links=ff.map(f=>`<a href="${f.u}" target="_blank" style="display:inline-block;margin-right:.4rem">${f.p.split('/').pop()}</a>`).join('');
h+=`<tr><td><b>${uc}</b></td><td><span class="badge b-p">PASS</span> <span style="color:var(--muted);font-size:.75rem">${d}</span></td><td>${links}</td></tr>`;}
else{h+=`<tr><td style="color:var(--muted)">${uc}</td><td><span class="badge b-w">PENDING</span></td><td>—</td></tr>`;}}
h+='</tbody></table>';
h+='<h2 style="font-size:1.1rem;margin-bottom:.75rem">Run History</h2>';
for(const run of runs.slice(0,10)){const sc=run.fail>0?'var(--red)':'var(--green)';
h+=`<div class="card"><h2>${run.sum}</h2><div class="meta"><b>Date:</b><span>${run.date}</span><b>Run ID:</b><span style="font-family:monospace;font-size:.75rem">${run.run}</span><b>Result:</b><span style="color:${sc}">${run.pass} passed, ${run.fail} failed</span><b>Files:</b><span>${run.files.length} evidence artifacts</span><b>Event:</b><span style="font-family:monospace;font-size:.7rem">${run.id.substring(0,24)}...</span></div>`;
h+=`<details><summary style="cursor:pointer;color:var(--link);font-size:.8rem">Show ${run.files.length} evidence files</summary><ul class="evi">${run.files.map(f=>`<li><a href="${f.u}" target="_blank">${f.p}</a> <span style="color:var(--muted)">(${f.s||'?'} bytes)</span></li>`).join('')}</ul></details></div>`;}
el.innerHTML=h;}
async function main(){await Promise.all(RELAYS.map(r=>conn(r)));render();}
main();
</script>
</body>
</html>
