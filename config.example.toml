# conwrt configuration
# Copy this file to config.toml and fill in your values.
# config.toml is gitignored — your keys and passwords stay local.

[ssh]
# Public keys for the router's authorized_keys.
# First key is also used for ASU image builds (firmware bakes one key).
# Two formats accepted per entry (auto-detected):
#   Inline key — value starts with "ssh-" (e.g. ssh-ed25519, ssh-rsa)
#   File path  — anything else, treated as path to .pub file
#
# Single key (backward compatible):
#   key = "~/.ssh/id_ed25519.pub"
#
# Multiple keys (all installed on router, first used for ASU):
keys = [
    "~/.ssh/id_ed25519.pub",
    # "ssh-rsa AAAA...your-second-key... user@host",
]

# --- Device identity ---
# [device]
# hostname = "my-router"     # Router hostname (alphanumeric + hyphens, max 63 chars)
# wifi_disable = false       # Disable all WiFi radios (for wired-only devices)
# lan_ip_mode = "mac-hash"   # "static" (use [network] lan_ip) or "mac-hash" (derive from MAC)
# hostname_pattern = "model_mac"  # "static", "model_mac" (e.g. lyra_aabbcc), "model_seq"

[password]
# Controls root password on the flashed router.
#   "random"   = generate a random password, print it once (default)
#   "key-only" = no password, SSH key auth only
#   " literal" = use this exact string as the password
mode = "random"

[asu]
# Extra packages appended in auto-package mode (when --packages is omitted).
extra_packages = ["luci", "luci-app-attendedsysupgrade"]

[network]
# Router LAN IP address. When set, conwrt changes the router's LAN IP after
# flashing and reconnects on the new subnet. Must be last step — the network
# restart drops SSH. conwrt updates its own interface alias automatically.
# lan_ip = "192.168.1.1"

# Allow SSH on the WAN interface (adds firewall rule, disables password on WAN).
wan_ssh = false

# Management WiFi (hidden, isolated 2.4GHz AP for SSH access)
# mgmt_wifi = true

# TxPower override for the management radio (dBm).
# Commented out = use OpenWrt default (usually 20 dBm / 100 mW).
# Lower values restrict range to device-adjacent only (e.g. 5 = ~3 mW).
# mgmt_wifi_txpower = 5

# --- WiFi STA (client mode) ---
# Router connects to an upstream AP (e.g. for WAN backhaul).
# Uncomment to enable. The correct radio is auto-detected from the band.
#
# [network.sta]
# band = "2.4ghz"           # "2.4ghz", "5ghz", "5ghz-low", "5ghz-high"
# ssid = "UpstreamNetwork"
# encryption = "psk2"        # psk2, psk3, sae, none
# key = "passphrase"

# --- WiFi AP (access point mode) ---
# Router broadcasts its own network.
# Uncomment to customize. When commented out, OpenWrt stock defaults apply.
#
# [network.ap]
# band = "2.4ghz"
# ssid = "MyOpenWrt"
# encryption = "psk2"
# key = "passphrase"
# channel = "auto"           # auto, 1-13 (2.4GHz), 36-165 (5GHz)

# --- Use case presets ---
# Enable pre-configured use cases. Each adds packages + first-boot config.
# Use 'python3 scripts/conwrt.py list-use-cases' to discover available presets.
# Use cases requiring hardware not present on your device are auto-skipped.
#
# [use_cases]
# enabled = ["tether"]
#
# [use_cases.tether]
# interface = "usbwan"
# enable_adb = true
#
# [use_cases.ssh-hardening]
# disable_password_auth = true   # key-only auth (requires SSH key in [ssh])
# idle_timeout = 300             # disconnect idle sessions after N seconds (0 = off)
# max_auth_tries = 3             # max auth attempts before disconnect
# port = 22                      # SSH listen port
# disable_gateway_ports = true   # block remote port forwarding

# --- WireGuard VPN server registration ---
# After flashing, conwrt reads the auto-generated WireGuard public key from
# the router and registers it with the VPN server via SSH.
# Requires [use_cases.wireguard-client] to be enabled and the server to have
# the WireGuard public key in the server's authorized_keys.
#
# [wireguard]
# registration_server = "my-vpn-server"  # SSH host alias from ~/.ssh/config
# wg_interface = "wg0"                   # WireGuard interface on the server
#
# [use_cases.mesh11sd]
# mesh_id = "MyMeshID"       # required — must match on all mesh nodes
# ssid = "MeshNet"            # AP SSID broadcast by mesh gate
# encryption = "1"            # 0=none, 1=wpa3, 2=wpa2, 3=mixed
# key = "MySecretKey"         # WiFi password for mesh gate AP
# auto_config = "0"           # 0=disabled, 1=auto, 2=auto+commit
#
# [use_cases.mwan3]
# primary = "wan"             # primary WAN interface
# secondary = "usbwan"        # secondary WAN interface (from USB tethering)
# policy = "failover"         # "failover" or "balanced"
#
# [use_cases.sqm]
# download_kbps = 340000      # required — 85-95% of actual download speed
# upload_kbps = 19000         # required — 85-95% of actual upload speed
# qdisc = "cake"              # "cake" or "fq_codel"
# link_layer = "ethernet"     # "none", "ethernet", "atm"
# overhead = 18               # per-packet overhead in bytes
#
# [use_cases.auto-sqm]
# # Auto-measure WAN speed and configure SQM automatically.
# # Experimental — not broadly tested across devices and link types.
# mode = "static"             # "static" (fixed speeds) or "dynamic" (auto-measure + cron)
# interface = "wan"           # WAN interface name
# device = "eth0"             # Physical device for byte counters
# target_percent = 90         # Apply SQM at this % of measured speed
# measurement_mode = "wget"   # "wget" (slow/cell links) or "iperf3" (fast links >50 Mbit/s)
# download_kbps = 0           # Static: 0 = measure on first boot, >0 = use this value
# upload_kbps = 0             # Static: 0 = use upload_fallback, >0 = use this value
# iperf3_host = ""            # iperf3 server (required if measurement_mode=iperf3)
# iperf3_port = 5201          # iperf3 server port
# test_url = "http://speedtest.tele2.net/10MB.zip"  # wget speed test file
# upload_fallback_kbps = 5000 # Fallback upload speed when can't measure
# hysteresis_percent = 10     # Don't reconfigure if change < this %
# dynamic_interval_hours = 4  # Re-tune interval (dynamic mode only)
#
# [use_cases.tollgate]
# # Binary download source:
# #   "auto"    — try nostr (Blossom) first, fall back to GitHub CI
# #   "nostr"   — NIP-94 events from trusted publisher on nostr relays
# #   "github"  — GitHub Actions CI artifacts via `gh` CLI
# source = "auto"
# channel = "stable"          # "stable", "beta", "alpha", "dev"
# version = "latest"          # "latest" or specific version tag (e.g. "v0.4.0")
# ipk_url = ""                # Direct URL to ipk (overrides source+version, for offline/custom builds)
# arch = ""                   # Target architecture (auto-detected from router if empty)
# mint_url = ""               # Cashu mint URL
# lightning_address = ""      # Lightning address for payouts
# price_per_minute = 1        # Price in sats per minute
#
# [use_cases.wireguard-client]
# # Management VPN (split tunnel — reach router remotely via VPN server)
# # private_key defaults to "generate" — each device auto-generates a unique key on first boot.
# # Post-flash: SSH in, run `uci get network.wg0.private_key | wg pubkey` to get the public key.
# # Register the public key with the VPN server.
# peer_public_key = "..."     # required — VPN server public key
# endpoint_host = "vpn.example.com"  # required — VPN server hostname or IP
# endpoint_port = 51820       # VPN server UDP port
# address = "10.67.0.2/32"   # Tunnel IP address with CIDR (must be unique per device)
# allowed_ips = "10.67.0.0/24"  # Only route VPN subnet (split tunnel)
# kill_switch = false         # No kill switch for management VPN
#
# # Full tunnel VPN (route all traffic through VPN)
# private_key = "..."         # required — WireGuard private key for the router
# peer_public_key = "..."     # required — VPN server public key
# endpoint_host = "vpn.example.com"  # required — VPN server hostname or IP
# endpoint_port = 51820       # VPN server UDP port
# address = "10.67.0.2/32"   # Tunnel IP address with CIDR
# kill_switch = true          # Block all traffic if VPN drops
#
# [use_cases.wireguard-server]
# private_key = "..."         # required — WireGuard private key for the server
# listen_port = 51820         # UDP listen port
# subnet = "10.1.99.1/24"    # VPN client subnet (server IP + CIDR)
# peer1_public_key = "..."    # First peer's public key
# peer1_allowed_ips = "10.1.99.2/32"  # First peer's allowed IPs
#
# [use_cases.travelmate]
# radio = "radio0"            # WiFi radio for upstream scanning
# timeout = 60                # Overall retry timeout in seconds
# retry = 5                   # Retry count to find a suitable uplink
# captive = true              # Enable captive portal detection
#
# [use_cases.adguard]
# listen_ip = "0.0.0.0"      # Web UI listen address
# web_port = 3000             # Web UI port (initial setup)
# dns_port = 5353             # DNS listen port (avoids conflict with dnsmasq)
# bootstrap_dns = "1.1.1.1,8.8.8.8"  # Upstream DNS for bootstrap
#
# [use_cases.openclash]
# proxy_type = "ss"           # Default proxy protocol: ss, vmess, trojan, vless
# core_type = "Meta"          # Clash core: Meta (Mihomo), Dev, Tun
# dns_mode = "redir-host"     # DNS mode: redir-host or fake-ip

# --- FIPS mesh over Bluetooth ---
# FIPS (Friend Identity Protocol Suite) mesh networking over RFCOMM Bluetooth.
# Devices with bluetooth capability auto-qualify for this use case.
# Requires the FIPS binary (standalone musl static binary for arm/mips).
#
# Enable in [use_cases]:
#   enabled = ["fips-bluetooth-rfcomm"]
#
# [use_cases.fips-bluetooth-rfcomm]
# role = "server"              # "server" (accepts connections) or "client" (initiates)
# channel = 1                  # RFCOMM channel (1-30)
# binary_path = "/tmp/fips_packages/fips"        # Local path to FIPS binary (host-side)
# binaryctl_path = "/tmp/fips_packages/fipsctl"  # Local path to fipsctl binary
# bt_pin = "0000"              # Bluetooth pairing PIN
# tun_enabled = true           # Enable TUN for IP-over-mesh
# tun_dns = true               # DNS over TUN
# tun_gateway = true           # Gateway over TUN
# # Peers — list of known FIPS mesh nodes
# # Each peer needs npub (public key) and bt_mac (Bluetooth MAC address)
# # Server mode: list all clients. Client mode: list the server.
# # peers = [
# #   { npub = "npub1...", bt_mac = "AA:BB:CC:DD:EE:FF" },
# # ]
