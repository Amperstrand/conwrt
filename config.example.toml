# conwrt configuration
# Copy this file to config.toml and fill in your values.
# config.toml is gitignored — your keys and passwords stay local.

[ssh]
# Public keys for the router's authorized_keys.
# First key is also used for ASU image builds (firmware bakes one key).
# Two formats accepted per entry (auto-detected):
#   Inline key — value starts with "ssh-" (e.g. ssh-ed25519, ssh-rsa)
#   File path  — anything else, treated as path to .pub file
#
# Single key (backward compatible):
#   key = "~/.ssh/id_ed25519.pub"
#
# Multiple keys (all installed on router, first used for ASU):
keys = [
    "~/.ssh/id_ed25519.pub",
    # "ssh-rsa AAAA...your-second-key... user@host",
]

[password]
# Controls root password on the flashed router.
#   "key-only" = no password, SSH key auth only (default, most secure)
#   "random"   = generate a random password, print it once
#   " literal" = use this exact string as the password
mode = "key-only"

[asu]
# Extra packages appended in auto-package mode (when --packages is omitted).
extra_packages = ["luci", "luci-app-attendedsysupgrade"]

[network]
# Allow SSH on the WAN interface (adds firewall rule, disables password on WAN).
wan_ssh = false

# Management WiFi (hidden, isolated 2.4GHz AP for SSH access)
# mgmt_wifi = true

# TxPower override for the management radio (dBm).
# Commented out = use OpenWrt default (usually 20 dBm / 100 mW).
# Lower values restrict range to device-adjacent only (e.g. 5 = ~3 mW).
# mgmt_wifi_txpower = 5

# --- WiFi STA (client mode) ---
# Router connects to an upstream AP (e.g. for WAN backhaul).
# Uncomment to enable. The correct radio is auto-detected from the band.
#
# [network.sta]
# band = "2.4ghz"           # "2.4ghz", "5ghz", "5ghz-low", "5ghz-high"
# ssid = "UpstreamNetwork"
# encryption = "psk2"        # psk2, psk3, sae, none
# key = "passphrase"

# --- WiFi AP (access point mode) ---
# Router broadcasts its own network.
# Uncomment to customize. When commented out, OpenWrt stock defaults apply.
#
# [network.ap]
# band = "2.4ghz"
# ssid = "MyOpenWrt"
# encryption = "psk2"
# key = "passphrase"
# channel = "auto"           # auto, 1-13 (2.4GHz), 36-165 (5GHz)

# --- Use case presets ---
# Enable pre-configured use cases. Each adds packages + first-boot config.
# Available: android-tether, iphone-tether, mesh11sd
#
# [use_cases]
# enabled = ["android-tether"]
#
# [use_cases.android-tether]
# interface = "usbwan"
#
# [use_cases.iphone-tether]
# interface = "usbwan"
#
# [use_cases.mesh11sd]
# mesh_id = "MyMeshID"       # required — must match on all mesh nodes
# ssid = "MeshNet"            # AP SSID broadcast by mesh gate
# encryption = "1"            # 0=none, 1=wpa3, 2=wpa2, 3=mixed
# key = "MySecretKey"         # WiFi password for mesh gate AP
# auto_config = "0"           # 0=disabled, 1=auto, 2=auto+commit
