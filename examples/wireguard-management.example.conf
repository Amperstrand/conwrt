# WireGuard Management VPN — Client Config Template
# Copy to wireguard/<device-name>.conf and fill in values.
# The wireguard/ directory and *.wg*.conf files are gitignored.

[Interface]
PrivateKey = generate
Address = 10.X.X.X/32

[Peer]
PublicKey = SERVER_PUBLIC_KEY
Endpoint = VPN_SERVER_IP:51820
AllowedIPs = 10.X.X.0/24
PersistentKeepalive = 25
